<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0F6E56">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Habits">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Habit Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080e0b;
  --bg2: #0e1712;
  --bg3: #141f19;
  --card: #111a14;
  --card2: #162019;
  --teal: #1D9E75;
  --teal-dim: #0F6E56;
  --teal-glow: rgba(29,158,117,0.15);
  --purple: #7F77DD;
  --purple-dim: #534AB7;
  --purple-glow: rgba(127,119,221,0.15);
  --red: #E24B4A;
  --red-dim: #A32D2D;
  --amber: #EF9F27;
  --text: #e8f0ec;
  --text2: #8aab98;
  --text3: #4d6e5a;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.10);
  --radius: 16px;
  --radius-sm: 10px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  overflow: hidden;
}

#app {
  height: 100dvh;
  display: flex;
  flex-direction: column;
  max-width: 430px;
  margin: 0 auto;
  position: relative;
}

/* ── STATUS BAR SPACER ── */
.status-bar {
  height: calc(var(--safe-top) + 8px);
  background: var(--bg);
  flex-shrink: 0;
}

/* ── HEADER ── */
.header {
  padding: 0 20px 14px;
  flex-shrink: 0;
}
.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 2px;
}
.app-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--text3);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.month-nav {
  display: flex;
  align-items: center;
  gap: 12px;
}
.nav-arrow {
  width: 28px; height: 28px;
  border-radius: 8px;
  background: var(--card);
  border: 0.5px solid var(--border2);
  color: var(--text2);
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: background 0.15s, transform 0.1s;
  user-select: none;
}
.nav-arrow:active { transform: scale(0.9); background: var(--card2); }
.month-display {
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -0.3px;
}
.month-year {
  font-size: 13px;
  color: var(--text3);
  font-weight: 400;
}

/* ── STATS ROW ── */
.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  padding: 0 20px 14px;
  flex-shrink: 0;
}
.stat-card {
  background: var(--card);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 10px 8px;
  text-align: center;
}
.stat-label {
  font-size: 9px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 4px;
}
.stat-val {
  font-size: 17px;
  font-weight: 600;
  font-family: 'DM Mono', monospace;
}
.stat-val.t { color: var(--teal); }
.stat-val.p { color: var(--purple); }

/* ── SCROLLABLE BODY ── */
.scroll-body {
  flex: 1;
  overflow-y: auto;
  padding: 0 20px;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.scroll-body::-webkit-scrollbar { display: none; }

/* ── CALENDAR ── */
.cal-wrap {
  background: var(--card);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 12px;
  margin-bottom: 14px;
}
.dow-row {
  display: grid;
  grid-template-columns: repeat(7,1fr);
  margin-bottom: 6px;
}
.dow {
  font-size: 10px;
  font-weight: 600;
  color: var(--text3);
  text-align: center;
  padding: 2px 0;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.day-grid {
  display: grid;
  grid-template-columns: repeat(7,1fr);
  gap: 3px;
}
.day {
  aspect-ratio: 1;
  border-radius: 9px;
  background: var(--bg3);
  border: 0.5px solid var(--border);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
  overflow: hidden;
  padding: 2px;
}
.day:active { transform: scale(0.92); }
.day.empty { background: transparent; border-color: transparent; cursor: default; pointer-events: none; }
.day.future { opacity: 0.25; cursor: default; pointer-events: none; }
.day.today { border-color: var(--teal-dim); border-width: 1.5px; }
.day.selected { border-color: var(--purple); border-width: 1.5px; background: var(--purple-glow); }
.day.perfect { background: var(--teal-glow); border-color: var(--teal); }
.day-num {
  font-size: 11px;
  font-weight: 600;
  font-family: 'DM Mono', monospace;
  color: var(--text2);
  line-height: 1;
  margin-bottom: 3px;
}
.day.today .day-num { color: var(--teal); }
.day.selected .day-num { color: var(--purple); }
.day.perfect .day-num { color: var(--teal); }
.pip-row { display: flex; gap: 2px; }
.pip {
  width: 5px; height: 3px;
  border-radius: 2px;
  background: var(--border2);
}
.pip.s { background: var(--teal); }
.pip.p { background: var(--purple); }
.pip.x { background: var(--red); }

.legend {
  display: flex;
  gap: 14px;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 0.5px solid var(--border);
}
.leg {
  display: flex; align-items: center; gap: 5px;
  font-size: 10px; color: var(--text3);
}
.leg-dot { width: 8px; height: 3px; border-radius: 2px; }

/* ── LOG PANEL ── */
.log-panel {
  background: var(--card);
  border: 0.5px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 14px;
}
.log-header {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 14px;
}
.log-title { font-size: 15px; font-weight: 600; }
.log-date { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }

.section-tag {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text3);
  margin-bottom: 10px;
}

/* ── PRAYER BUTTONS ── */
.prayer-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 6px;
  margin-bottom: 14px;
}
.p-btn {
  background: var(--bg3);
  border: 0.5px solid var(--border2);
  border-radius: var(--radius-sm);
  padding: 10px 4px 8px;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
  user-select: none;
}
.p-btn:active { transform: scale(0.94); }
.p-btn-name {
  font-size: 9px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text3);
  margin-bottom: 6px;
}
.p-dot {
  width: 24px; height: 24px;
  border-radius: 50%;
  background: var(--border2);
  margin: 0 auto;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.p-btn.yes { border-color: var(--teal-dim); background: var(--teal-glow); }
.p-btn.yes .p-dot { background: var(--teal); }
.p-btn.yes .p-btn-name { color: var(--teal); }
.p-btn.no { border-color: var(--red-dim); background: rgba(226,75,74,0.08); }
.p-btn.no .p-dot { background: var(--red); }
.p-btn.no .p-btn-name { color: var(--red); }

/* ── SLEEP ROW ── */
.sleep-section {
  background: var(--bg3);
  border: 0.5px solid var(--border2);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
}
.sleep-icon {
  width: 32px; height: 32px;
  border-radius: 8px;
  background: var(--teal-glow);
  border: 0.5px solid var(--teal-dim);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.sleep-label { font-size: 13px; font-weight: 500; flex: 1; }
.sleep-sub { font-size: 10px; color: var(--text3); margin-top: 1px; }
.sleep-btns { display: flex; gap: 6px; flex-shrink: 0; }
.s-btn {
  font-size: 12px;
  font-weight: 600;
  padding: 6px 14px;
  border-radius: 20px;
  border: 0.5px solid var(--border2);
  background: var(--card);
  color: var(--text2);
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.15s;
  user-select: none;
}
.s-btn:active { transform: scale(0.94); }
.s-btn.yes { background: var(--teal-glow); color: var(--teal); border-color: var(--teal-dim); }
.s-btn.no { background: rgba(226,75,74,0.1); color: var(--red); border-color: var(--red-dim); }

/* ── STATUS PILL ── */
.status-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  width: 100%;
  justify-content: center;
}
.status-pill.great { background: var(--teal-glow); color: var(--teal); border: 0.5px solid var(--teal-dim); }
.status-pill.ok { background: rgba(239,159,39,0.1); color: var(--amber); border: 0.5px solid rgba(239,159,39,0.3); }
.status-pill.miss { background: rgba(226,75,74,0.08); color: var(--red); border: 0.5px solid var(--red-dim); }
.status-pill.empty { background: var(--bg3); color: var(--text3); border: 0.5px solid var(--border); }

/* ── BOTTOM SAFE AREA ── */
.bottom-spacer { height: calc(var(--safe-bot) + 12px); flex-shrink: 0; }

/* SVG icons */
svg { display: block; }
</style>
</head>
<body>
<div id="app">
  <div class="status-bar"></div>

  <div class="header">
    <div class="header-top">
      <span class="app-name">Habit Tracker</span>
      <div class="month-nav">
        <div class="nav-arrow" id="prev">&#8249;</div>
        <div class="nav-arrow" id="next">&#8250;</div>
      </div>
    </div>
    <div>
      <div class="month-display" id="month-display"></div>
      <div class="month-year" id="month-year"></div>
    </div>
  </div>

  <div class="stats">
    <div class="stat-card"><div class="stat-label">Sleep streak</div><div class="stat-val t" id="ss">0d</div></div>
    <div class="stat-card"><div class="stat-label">Prayer streak</div><div class="stat-val p" id="ps">0d</div></div>
    <div class="stat-card"><div class="stat-label">Sleep</div><div class="stat-val" id="sc">—</div></div>
    <div class="stat-card"><div class="stat-label">Prayers</div><div class="stat-val" id="pc">—</div></div>
  </div>

  <div class="scroll-body">
    <div class="cal-wrap">
      <div class="dow-row">
        <div class="dow">S</div><div class="dow">M</div><div class="dow">T</div>
        <div class="dow">W</div><div class="dow">T</div><div class="dow">F</div><div class="dow">S</div>
      </div>
      <div class="day-grid" id="day-grid"></div>
      <div class="legend">
        <div class="leg"><div class="leg-dot" style="background:var(--teal)"></div>Sleep</div>
        <div class="leg"><div class="leg-dot" style="background:var(--purple)"></div>Prayers</div>
        <div class="leg"><div class="leg-dot" style="background:var(--red)"></div>Missed</div>
        <div class="leg"><div class="leg-dot" style="background:var(--border2)"></div>Unlogged</div>
      </div>
    </div>

    <div class="log-panel">
      <div class="log-header">
        <div class="log-title" id="log-title">Today</div>
        <div class="log-date" id="log-date"></div>
      </div>

      <div class="section-tag">5 Daily Prayers</div>
      <div class="prayer-grid" id="prayer-grid"></div>

      <div class="sleep-section">
        <div class="sleep-icon">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M13.5 9.5A6 6 0 017 3a6 6 0 100 10 6 6 0 006.5-3.5z" fill="var(--teal)" opacity="0.9"/>
          </svg>
        </div>
        <div style="flex:1">
          <div class="sleep-label">Slept before 12am</div>
          <div class="sleep-sub">Tap to log tonight's sleep</div>
        </div>
        <div class="sleep-btns" id="sleep-btns"></div>
      </div>

      <div id="status-area"></div>
    </div>

    <div class="bottom-spacer"></div>
  </div>
</div>

<script>
const PRAYERS = ['Fajr','Dhuhr','Asr','Maghrib','Isha'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

const today = new Date();
const TY = today.getFullYear(), TM = today.getMonth(), TD = today.getDate();
let vY = TY, vM = TM, selDay = TD;

let data = {};
try { data = JSON.parse(localStorage.getItem('hbt_pwa') || '{}'); } catch(e) {}
const save = () => { try { localStorage.setItem('hbt_pwa', JSON.stringify(data)); } catch(e) {} };

function key(y,m,d) { return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function dd(y,m,d) {
  const k = key(y,m,d);
  if(!data[k]) data[k] = {prayers:{Fajr:null,Dhuhr:null,Asr:null,Maghrib:null,Isha:null},sleep:null};
  return data[k];
}
function isPast(y,m,d) { return new Date(y,m,d) <= new Date(TY,TM,TD); }
function fullPrayer(y,m,d) { return PRAYERS.every(p => dd(y,m,d).prayers[p] === true); }
function sleepOk(y,m,d) { return dd(y,m,d).sleep === true; }

function streak(fn) {
  let s = 0, d = new Date(TY,TM,TD);
  for(let i=0;i<120;i++){
    const y=d.getFullYear(),m=d.getMonth(),day=d.getDate();
    if(!isPast(y,m,day)){d.setDate(d.getDate()-1);continue;}
    if(fn(y,m,day)) s++; else break;
    d.setDate(d.getDate()-1);
  }
  return s;
}

function renderStats() {
  document.getElementById('ss').textContent = streak((y,m,d)=>sleepOk(y,m,d))+'d';
  document.getElementById('ps').textContent = streak((y,m,d)=>fullPrayer(y,m,d))+'d';
  if(vM===TM && vY===TY) {
    let sc=0,pc=0;
    for(let d=1;d<=TD;d++){
      if(sleepOk(TY,TM,d)) sc++;
      if(fullPrayer(TY,TM,d)) pc++;
    }
    document.getElementById('sc').textContent = sc+'/'+TD;
    document.getElementById('pc').textContent = pc+'/'+TD;
  } else {
    document.getElementById('sc').textContent = '—';
    document.getElementById('pc').textContent = '—';
  }
}

function renderCal() {
  const dim = new Date(vY,vM+1,0).getDate();
  const fdow = new Date(vY,vM,1).getDay();
  document.getElementById('month-display').textContent = MONTHS[vM];
  document.getElementById('month-year').textContent = vY + ' · ' + dim + ' days';

  const grid = document.getElementById('day-grid');
  grid.innerHTML = '';

  for(let i=0;i<fdow;i++){
    const e=document.createElement('div');
    e.className='day empty';
    grid.appendChild(e);
  }

  for(let d=1;d<=dim;d++){
    const el=document.createElement('div');
    const past=isPast(vY,vM,d);
    const isT=d===TD&&vM===TM&&vY===TY;
    const isSel=d===selDay&&vM===TM&&vY===TY;
    const sleep=past&&sleepOk(vY,vM,d);
    const prayer=past&&fullPrayer(vY,vM,d);
    const rec=past?dd(vY,vM,d):null;
    const anyMiss=rec&&(rec.sleep===false||PRAYERS.some(p=>rec.prayers[p]===false));

    let cls='day'+(past?'':' future')+(isT?' today':'')+(isSel?' selected':'')+(sleep&&prayer?' perfect':'');
    el.className=cls;

    let pipS='',pipP='';
    if(past){
      pipS=rec.sleep===true?'s':rec.sleep===false?'x':'';
      const missP=PRAYERS.some(p=>rec.prayers[p]===false);
      pipP=prayer?'p':missP?'x':'';
    }

    el.innerHTML=`<div class="day-num">${d}</div>`+
      (past?`<div class="pip-row"><div class="pip ${pipS}"></div><div class="pip ${pipP}"></div></div>`:'');

    if(past) el.onclick=()=>{selDay=d;renderCal();renderLog();};
    grid.appendChild(el);
  }
}

function checkIcon(color='#fff', size=12) {
  return `<svg width="${size}" height="${size}" viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
}
function xIcon(color='#fff', size=10) {
  return `<svg width="${size}" height="${size}" viewBox="0 0 10 10"><line x1="2" y1="2" x2="8" y2="8" stroke="${color}" stroke-width="2" stroke-linecap="round"/><line x1="8" y1="2" x2="2" y2="8" stroke="${color}" stroke-width="2" stroke-linecap="round"/></svg>`;
}

function renderLog() {
  const isNow=vM===TM&&vY===TY;
  const rec=dd(vY,vM,selDay);
  const dateObj=new Date(vY,vM,selDay);
  document.getElementById('log-title').textContent=(selDay===TD&&isNow)?'Today':DAYS_SHORT[dateObj.getDay()]+' '+selDay;
  document.getElementById('log-date').textContent=MONTHS[vM].slice(0,3).toUpperCase()+' '+String(selDay).padStart(2,'0')+' · '+vY;

  const pg=document.getElementById('prayer-grid');
  pg.innerHTML='';
  PRAYERS.forEach(p=>{
    const val=rec.prayers[p];
    const btn=document.createElement('div');
    btn.className='p-btn'+(val===true?' yes':val===false?' no':'');
    btn.innerHTML=`<div class="p-btn-name">${p}</div><div class="p-dot">${val===true?checkIcon():val===false?xIcon():''}</div>`;
    btn.onclick=()=>{
      rec.prayers[p]=val===null?true:val===true?false:null;
      save();renderCal();renderLog();renderStats();
    };
    pg.appendChild(btn);
  });

  const sb=document.getElementById('sleep-btns');
  sb.innerHTML='';
  ['Yes','No'].forEach(label=>{
    const b=document.createElement('button');
    const isY=label==='Yes';
    b.className='s-btn'+(rec.sleep===true&&isY?' yes':rec.sleep===false&&!isY?' no':'');
    b.textContent=label;
    b.onclick=()=>{
      rec.sleep=isY?(rec.sleep===true?null:true):(rec.sleep===false?null:false);
      save();renderCal();renderLog();renderStats();
    };
    sb.appendChild(b);
  });

  const prayed=PRAYERS.filter(p=>rec.prayers[p]===true).length;
  const missed=PRAYERS.filter(p=>rec.prayers[p]===false).length;
  let cls='empty',txt='Tap prayers and sleep to log today';
  if(prayed===5&&rec.sleep===true){cls='great';txt='Perfect day — keep this streak alive';}
  else if(prayed===5){cls='ok';txt='All 5 prayers done — fix the sleep next';}
  else if(rec.sleep===true&&missed===0){cls='ok';txt='Slept on time — now log your prayers';}
  else if(missed>0||rec.sleep===false){
    cls='miss';
    txt=(missed>0?missed+' prayer'+(missed>1?'s':'')+' missed':'')+(missed>0&&rec.sleep===false?', ':'')+(rec.sleep===false?'slept late':'');
  }
  document.getElementById('status-area').innerHTML=`<div class="status-pill ${cls}">${txt}</div>`;
}

document.getElementById('prev').onclick=()=>{
  vM--;if(vM<0){vM=11;vY--;}
  selDay=(vM===TM&&vY===TY)?TD:1;
  renderCal();renderLog();renderStats();
};
document.getElementById('next').onclick=()=>{
  const nm=vM+1>11?0:vM+1,ny=vM+1>11?vY+1:vY;
  if(ny>TY||(ny===TY&&nm>TM))return;
  vM=nm;vY=ny;
  selDay=(vM===TM&&vY===TY)?TD:1;
  renderCal();renderLog();renderStats();
};

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

renderCal();renderLog();renderStats();
</script>
</body>
</html>
